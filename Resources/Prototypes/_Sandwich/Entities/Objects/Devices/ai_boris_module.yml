# AI Cyborg Remote Control Module — AI server module that generates a 4-digit pairing code
# for AI-controlled borg drones. Insert into the AI Controller Server.
- type: entity
  id: AiBorisControlModule
  parent: BaseAiServerModule
  name: AI cyborg remote control module
  description: Allows an AI to remotely control borg drones paired via a 4-digit code. Install in the AI Controller Server.
  components:
  - type: AiServerModule
    moduleId: Boris
    moduleType: Boris
    grantedAction: ActionOpenBorisControl
  - type: BorisControlModule
  - type: Sprite
    sprite: Objects/Specific/Robotics/borgmodule.rsi
    layers:
    - state: generic
    - state: security
  - type: StaticPrice
    price: 500

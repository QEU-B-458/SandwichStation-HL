# Base AI server module - all modules inherit from this
- type: entity
  id: BaseAiServerModule
  parent: BaseItem
  abstract: true
  components:
  - type: AiServerModule
  - type: Sprite
    sprite: Objects/Specific/Robotics/borgmodule.rsi
    layers:
    - state: generic
  - type: Item
    size: Small
  - type: Tag
    tags:
    - AiServerModule

# --- Module Boards ---

- type: entity
  id: AiModuleCargo
  parent: BaseAiServerModule
  name: AI cargo module
  description: Grants an AI access to cargo management systems including orders and shuttle dispatch.
  components:
  - type: AiServerModule
    moduleId: Cargo
    moduleType: Cargo
  - type: Sprite
    sprite: Objects/Specific/Robotics/borgmodule.rsi
    layers:
    - state: generic
    - state: icon-appraisal
  - type: StaticPrice
    price: 250

- type: entity
  id: AiModuleSecurity
  parent: BaseAiServerModule
  name: AI security module
  description: Grants an AI access to security systems including area door bolts and alert levels.
  components:
  - type: AiServerModule
    moduleId: Security
    moduleType: Security
  - type: Sprite
    sprite: Objects/Specific/Robotics/borgmodule.rsi
    layers:
    - state: generic
    - state: icon-gps
  - type: StaticPrice
    price: 250

- type: entity
  id: AiModulePower
  parent: BaseAiServerModule
  name: AI power management module
  description: Grants an AI access to advanced power grid management including APC priority routing and circuit isolation.
  components:
  - type: AiServerModule
    moduleId: Power
    moduleType: Power
  - type: Sprite
    sprite: Objects/Specific/Robotics/borgmodule.rsi
    layers:
    - state: generic
    - state: icon-cables
  - type: StaticPrice
    price: 250

- type: entity
  id: AiModuleAtmos
  parent: BaseAiServerModule
  name: AI atmospherics module
  description: Grants an AI access to atmospheric control systems including bulk vent and scrubber management.
  components:
  - type: AiServerModule
    moduleId: Atmos
    moduleType: Atmos
  - type: Sprite
    sprite: Objects/Specific/Robotics/borgmodule.rsi
    layers:
    - state: generic
    - state: icon-gas-analyzer
  - type: StaticPrice
    price: 250

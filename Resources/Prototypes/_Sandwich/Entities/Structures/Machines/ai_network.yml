- type: entity
  parent: [ BaseMachinePowered, ConstructibleMachine ]
  id: AiControllerServer
  name: AI controller server
  description: A server that manages an AI core's network access. Link to an AI core and relays with a multitool.
  components:
    - type: AiNetworkServer
      moduleWhitelist:
        tags:
        - AiServerModule
    - type: Machine
      board: AiControllerServerMachineCircuitboard
    - type: ApcPowerReceiver
      powerLoad: 200
    - type: WiresPanel
    - type: ContainerContainer
      containers:
        ai_server_module: !type:Container { }
    - type: ActivatableUI
      key: enum.AiServerUiKey.Key
    - type: ActivatableUIRequiresPanel
    - type: UserInterface
      interfaces:
        enum.AiServerUiKey.Key:
          type: AiServerBoundUserInterface
    - type: Sprite
      sprite: Structures/Machines/server.rsi
      snapCardinals: true
      layers:
        - state: server
    - type: AmbientOnPowered
    - type: AmbientSound
      volume: -9
      range: 5
      sound:
        path: /Audio/Ambience/Objects/server_fans.ogg
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 100
          behaviors:
            - !type:PlaySoundBehavior
              sound:
                collection: MetalBreak
            - !type:ChangeConstructionNodeBehavior
              node: machineFrame
            - !type:DoActsBehavior
              acts: ["Destruction"]

# Station variant — pre-loaded with full-access Auth module for map-placed station AIs
- type: entity
  parent: AiControllerServer
  id: AiControllerServerStation
  suffix: Station
  categories: [ HideSpawnMenu ]
  components:
    - type: ContainerFill
      containers:
        ai_server_module:
        - AiAuthModuleStation

- type: entity
  parent: [ BaseMachinePowered, ConstructibleMachine ]
  id: AiRelay
  name: AI network relay
  description: Extends an AI's network access to the grid this relay is placed on. Link to an AI controller server with a multitool.
  components:
    - type: AiRelay
    - type: Machine
      board: AiRelayMachineCircuitboard
    - type: ApcPowerReceiver
      powerLoad: 50
    - type: Sprite
      sprite: Structures/Machines/server.rsi
      snapCardinals: true
      layers:
        - state: server
    - type: AmbientOnPowered
    - type: AmbientSound
      volume: -9
      range: 5
      sound:
        path: /Audio/Ambience/Objects/server_fans.ogg
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 80
          behaviors:
            - !type:PlaySoundBehavior
              sound:
                collection: MetalBreak
            - !type:ChangeConstructionNodeBehavior
              node: machineFrame
            - !type:DoActsBehavior
              acts: ["Destruction"]

# AI Interface — a modified borg charger that allows an AI Deployment Borg
# to upload into a linked AI Core. Auto-links to an AI Controller Server on
# the same grid.
- type: entity
  parent: BorgCharger
  id: AiInterface
  name: AI interface
  description: A specialized docking station that allows an AI deployment borg to upload into a linked AI core. Step inside and interface with the core.
  components:
  - type: AiInterface
  # Only accept deployment borgs
  - type: EntityStorage
    capacity: 1
    whitelist:
      components:
      - AiDeploymentBorg
  - type: Charger
    chargeRate: 30
    slotId: entity_storage
    whitelist:
      components:
      - AiDeploymentBorg
